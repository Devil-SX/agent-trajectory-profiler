name: Backend Performance

on:
  pull_request:
    branches: [master]
  schedule:
    - cron: "20 2 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Benchmark mode"
        required: true
        default: "quick"
        type: choice
        options:
          - quick
          - full

jobs:
  backend-performance-quick:
    if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'quick')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run backend perf quick profile (soft gate)
        run: uv run python scripts/run_backend_perf.py --mode quick --output-dir perf-artifacts

      - name: Run parser benchmark quick profile
        run: uv run python scripts/run_parser_bench.py --mode quick --output-dir perf-artifacts

      - name: Publish benchmark summary
        run: |
          cat perf-artifacts/backend-perf-summary.md >> "$GITHUB_STEP_SUMMARY"
          printf "\n" >> "$GITHUB_STEP_SUMMARY"
          cat perf-artifacts/parser-benchmark-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload backend perf artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-perf-quick-${{ github.run_id }}
          path: perf-artifacts/

  backend-performance-full:
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'full')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run backend perf full profile (soft gate)
        run: uv run python scripts/run_backend_perf.py --mode full --output-dir perf-artifacts

      - name: Run parser benchmark full profile
        run: uv run python scripts/run_parser_bench.py --mode full --output-dir perf-artifacts

      - name: Publish benchmark summary
        run: |
          cat perf-artifacts/backend-perf-summary.md >> "$GITHUB_STEP_SUMMARY"
          printf "\n" >> "$GITHUB_STEP_SUMMARY"
          cat perf-artifacts/parser-benchmark-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload backend perf artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-perf-full-${{ github.run_id }}
          path: perf-artifacts/
